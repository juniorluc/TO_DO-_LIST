<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <link rel="stylesheet" href="/TO_DO-_LIST/frontend/css/style.css">
</head>
<body>

    <header>
        <h1>Lista de tarefas</h1>
    </header>

    <main>
        <header>
            <ul class="fixed-tabs">
                <li>ID</li>
                <li>Nome</li>
                <li>Preço</li>
                <li>Descrição</li>
                <li>Ação</li>
            </ul>
        </header>

        <section>
                <ul class="list-data">
                <li>1</li>
                <li>Marcos</li>
                <li>200</li>
                <li>Yummi</li>
                <button class="view-button">Visualizar</button>
                <button class="edit-button">Editar</button>
                <button class="delete-button">Deletar</button>
            </ul>
        </section>

        <button class="add-button">Adicionar</button>

    </main>

    <footer>
        <p>Projeto desenvolvido por Junior e Danilo</p>
    </footer>
    
</body>

<script src="/frontend/js/script.js"></script>

</html>
